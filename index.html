    <!-- Critical CSS: Render Hero Section Instantly without waiting for Tailwind -->
    <style>
      body { margin: 0; font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #0f172a; }
      
      /* Manual Styles for Critical Hero Section */
      .c-nav { height: 80px; width: 100%; position: fixed; top: 0; z-index: 50; background: rgba(255,255,255,0.95); border-bottom: 1px solid #f1f5f9; }
      .c-hero { padding-top: 140px; padding-bottom: 60px; text-align: center; position: relative; overflow: hidden; background: linear-gradient(180deg, #ffffff 0%, #eff6ff 100%); }
      .c-badge { display: inline-flex; align-items: center; padding: 6px 12px; background: #fef2f2; color: #dc2626; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: uppercase; border: 1px solid #fee2e2; margin-bottom: 24px; }
      .c-title { font-size: 36px; font-weight: 900; line-height: 1.1; color: #0f172a; margin: 0 0 24px 0; letter-spacing: -1px; }
      .c-title span { color: #2563eb; }
      .c-desc { font-size: 16px; color: #64748b; margin: 0 auto 32px auto; max-width: 700px; line-height: 1.6; padding: 0 20px; }
      .c-btn { background-color: #2563eb; color: white; font-weight: 700; font-size: 18px; padding: 16px 32px; border-radius: 16px; border: none; cursor: pointer; display: inline-flex; align-items: center; text-decoration: none; box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3); transition: transform 0.2s; }
      .c-btn:hover { background-color: #1d4ed8; transform: translateY(-2px); }
      
      /* Mobile optimization */
      @media (min-width: 768px) {
        .c-title { font-size: 64px; margin-bottom: 32px; }
        .c-desc { font-size: 20px; margin-bottom: 48px; }
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 8px; height: 8px; }
      ::-webkit-scrollbar-track { background: #f1f5f9; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
